<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FRAMOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0A0A0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: #FFFFFF;
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1A0033 0%, #330066 50%, #6600CC 100%);
            width: 100%;
            max-width: 500px;
        }

        #loginScreen h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF0066, #FFCC00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        #loginForm {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
        }

        #loginForm input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        #loginForm input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        #loginForm button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #googleBtn {
            background: white !important;
            color: #6600CC !important;
        }

        #mainApp {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: #0A0A0F;
        }

        .framor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0A0A0F;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF0066, #FFCC00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-bar {
            display: flex;
            background: #0A0A0F;
            padding: 8px 16px;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #888;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
        }

        .panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .panel.active {
            display: block;
        }

        .post-card, .message-bubble, .friend-card, .profile-card {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .post-user {
            color: #FF6600;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: #FF0066;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
        }

        .comment-btn {
            color: #FFCC00;
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .comment {
            padding: 8px 0;
            font-size: 13px;
            color: #aaa;
        }

        .comment strong {
            color: #FF6600;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input input {
            flex: 1;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
        }

        .comment-input button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #1A1A24;
            border-radius: 30px;
            margin-top: 12px;
            position: sticky;
            bottom: 0;
        }

        .chat-input-container input {
            flex: 1;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 30px;
            color: white;
        }

        .chat-input-container button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .create-post {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .create-post textarea, .create-post input {
            width: 100%;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 16px;
            color: white;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .create-post button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .logout-btn, .edit-profile-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .edit-profile-btn {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            margin-top: 16px;
        }

        video, .post-image, .profile-avatar {
            width: 100%;
            border-radius: 16px;
            margin-top: 8px;
        }

        .post-image {
            max-height: 400px;
            object-fit: cover;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 16px;
            display: block;
        }

        .profile-info {
            text-align: center;
        }

        .profile-info h3 {
            margin-bottom: 8px;
        }

        .profile-info p {
            color: #aaa;
            margin-bottom: 8px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #FF6600;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: center;
        }

        .error {
            background: rgba(255, 0, 102, 0.2);
            color: #FF0066;
        }

        .success {
            background: rgba(0, 255, 102, 0.2);
            color: #00FF66;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .search-box, .profile-input {
            width: 100%;
            padding: 12px;
            background: #1A1A24;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            margin-bottom: 16px;
        }

        .profile-input {
            margin-bottom: 12px;
        }

        .friend-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .accept-btn, .reject-btn, .add-friend-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .accept-btn {
            background: #00FF66;
            color: black;
        }

        .reject-btn {
            background: #FF0066;
            color: white;
        }

        .add-friend-btn {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
        }

        h3 {
            margin: 20px 0 10px;
            font-size: 16px;
        }

        .chat-friend-item {
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-friend-item:hover {
            background: rgba(255, 102, 0, 0.2);
        }

        .selected-chat {
            background: rgba(255, 102, 0, 0.3);
            border: 1px solid #FF6600;
        }

        .liked {
            color: #FF0066;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div id="loginScreen">
    <h1>FRAMOR</h1>
    <p>Connect differently ✨</p>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="signupBtn">Create Account</button>
        <button id="loginBtn">Sign In</button>
        <button id="googleBtn">🚀 Sign in with Google</button>
    </div>
    <div id="loginMessage"></div>
</div>

<div id="mainApp">
    <div class="framor-header">
        <div class="logo">FRAMOR</div>
        <button class="logout-btn" id="logoutBtn">Exit</button>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" data-panel="feed">📱 Feed</button>
        <button class="nav-item" data-panel="videos">🎵 Reels</button>
        <button class="nav-item" data-panel="friends">👥 Friends</button>
        <button class="nav-item" data-panel="profile">👤 Profile</button>
        <button class="nav-item" data-panel="chat">💬 Chat</button>
    </div>

    <div id="feedPanel" class="panel active">
        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind? 🔥" rows="2"></textarea>
            <input type="file" id="postImage" accept="image/*" placeholder="📸 Image">
            <input type="file" id="postVideo" accept="video/*" placeholder="🎥 Video">
            <button id="createPostBtn">✨ Post to FRAMOR</button>
        </div>
        <div id="feedList"></div>
    </div>

    <div id="videosPanel" class="panel">
        <div id="videoList"></div>
    </div>

    <div id="friendsPanel" class="panel">
        <input type="text" id="searchUsers" class="search-box" placeholder="🔍 Search users to add...">
        <div id="searchResults"></div>
        <h3>👥 My Friends</h3>
        <div id="friendsList"></div>
        <h3>📨 Friend Requests</h3>
        <div id="friendRequests"></div>
    </div>

    <div id="profilePanel" class="panel">
        <div id="profileView">
            <div class="profile-card" id="profileDisplay">
                <div class="profile-info">
                    <div class="profile-stats" id="profileStats"></div>
                    <button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button>
                </div>
            </div>
        </div>
        <div id="profileEdit" style="display:none;">
            <div class="profile-card">
                <h3>Edit Profile</h3>
                <input type="text" id="editDisplayName" class="profile-input" placeholder="Display Name">
                <textarea id="editBio" class="profile-input" rows="3" placeholder="Bio"></textarea>
                <input type="text" id="editLocation" class="profile-input" placeholder="Location">
                <input type="text" id="editWebsite" class="profile-input" placeholder="Website">
                <button id="saveProfileBtn" class="edit-profile-btn">💾 Save Changes</button>
                <button id="cancelEditBtn" class="logout-btn" style="margin-top: 8px;">Cancel</button>
            </div>
        </div>
        <div id="myPostsList"></div>
    </div>

    <div id="chatPanel" class="panel">
        <div id="chatFriendsList"></div>
        <div id="chatMessages" style="max-height: 50vh; overflow-y: auto; margin-top: 16px;"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Select a friend to chat..." disabled>
            <button id="sendChatBtn" disabled>Send</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // Supabase configuration
        const SUPABASE_URL = "https://pknztsbadizlcnlzppch.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Qvi0piL5vNk-734kukD5GA_WtC6nSvb";
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Global variables
        let currentUser = null;
        let realtimeChannels = [];
        let selectedChatFriend = null;
        let userProfile = null;
        
        // DOM elements
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginMessage = document.getElementById('loginMessage');
        
        // Helper function to show messages
        function showMessage(element, text, type) {
            if (!element) return;
            element.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (element.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    element.innerHTML = '';
                }
            }, 3000);
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ============ PROFILE FUNCTIONS ============
        async function loadProfile() {
            if (!currentUser) return;
            
            // Get or create user profile
            let { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            if (!profile) {
                // Create profile if doesn't exist
                const { data: newProfile } = await supabase
                    .from('user_profiles')
                    .insert({
                        id: currentUser.id,
                        display_name: currentUser.email.split('@')[0]
                    })
                    .select()
                    .single();
                profile = newProfile;
            }
            
            userProfile = profile;
            
            // Get user's posts count
            const { count: postsCount } = await supabase
                .from('posts')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', currentUser.id);
            
            // Get friends count
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendsCount = friendships?.length || 0;
            
            // Display profile
            const displayName = profile?.display_name || currentUser.email.split('@')[0];
            const bio = profile?.bio || 'No bio yet';
            const location = profile?.location || 'No location set';
            const website = profile?.website || 'No website';
            
            document.getElementById('profileDisplay').innerHTML = `
                <div class="profile-info">
                    <h3>${escapeHtml(displayName)}</h3>
                    <p>📧 ${escapeHtml(currentUser.email)}</p>
                    <p>📝 ${escapeHtml(bio)}</p>
                    <p>📍 ${escapeHtml(location)}</p>
                    <p>🔗 ${escapeHtml(website)}</p>
                    <div class="profile-stats">
                        <div class="stat">
                            <div class="stat-value">${postsCount || 0}</div>
                            <div class="stat-label">Posts</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${friendsCount}</div>
                            <div class="stat-label">Friends</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Load user's own posts
            const { data: myPosts } = await supabase
                .from('posts')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            const myPostsDiv = document.getElementById('myPostsList');
            if (myPosts && myPosts.length > 0) {
                myPostsDiv.innerHTML = '<h3>📝 My Posts</h3>' + myPosts.map(post => `
                    <div class="post-card">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <span>❤️ ${post.likes || 0} likes</span>
                        </div>
                    </div>
                `).join('');
            } else {
                myPostsDiv.innerHTML = '<h3>📝 My Posts</h3><div class="loading">No posts yet. Create your first post!</div>';
            }
            
            // Set edit form values
            document.getElementById('editDisplayName').value = profile?.display_name || '';
            document.getElementById('editBio').value = profile?.bio || '';
            document.getElementById('editLocation').value = profile?.location || '';
            document.getElementById('editWebsite').value = profile?.website || '';
        }
        
        // Edit profile
        document.getElementById('editProfileBtn')?.addEventListener('click', () => {
            document.getElementById('profileDisplay').style.display = 'none';
            document.getElementById('profileEdit').style.display = 'block';
        });
        
        document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
            document.getElementById('profileDisplay').style.display = 'block';
            document.getElementById('profileEdit').style.display = 'none';
        });
        
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const displayName = document.getElementById('editDisplayName').value;
            const bio = document.getElementById('editBio').value;
            const location = document.getElementById('editLocation').value;
            const website = document.getElementById('editWebsite').value;
            
            const { error } = await supabase
                .from('user_profiles')
                .update({
                    display_name: displayName,
                    bio: bio,
                    location: location,
                    website: website,
                    updated_at: new Date()
                })
                .eq('id', currentUser.id);
            
            if (error) {
                alert('Error updating profile: ' + error.message);
            } else {
                alert('Profile updated successfully!');
                document.getElementById('profileDisplay').style.display = 'block';
                document.getElementById('profileEdit').style.display = 'none';
                await loadProfile();
            }
        });
        
        // ============ FRIENDS FUNCTIONS ============
        async function loadFriends() {
            if (!currentUser) return;
            
            // Get accepted friends
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            
            if (friendIds.length > 0) {
                const { data: friends } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', friendIds);
                
                document.getElementById('friendsList').innerHTML = friends?.map(f => `
                    <div class="friend-card">👤 ${escapeHtml(f.email.split('@')[0])}</div>
                `).join('') || '<div class="loading">No friends yet</div>';
            } else {
                document.getElementById('friendsList').innerHTML = '<div class="loading">No friends yet. Search above!</div>';
            }
            
            // Get pending friend requests
            const { data: requests } = await supabase
                .from('friends')
                .select('*')
                .eq('friend_id', currentUser.id)
                .eq('status', 'pending');
            
            if (requests && requests.length > 0) {
                const requesterIds = requests.map(r => r.user_id);
                const { data: requesters } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', requesterIds);
                
                document.getElementById('friendRequests').innerHTML = requesters?.map(r => `
                    <div class="friend-card">
                        👤 ${escapeHtml(r.email.split('@')[0])}
                        <div class="friend-actions">
                            <button class="accept-btn" onclick="acceptFriend('${r.id}')">Accept</button>
                            <button class="reject-btn" onclick="rejectFriend('${r.id}')">Reject</button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('friendRequests').innerHTML = '<div class="loading">No pending requests</div>';
            }
        }
        
        // Accept friend request
        window.acceptFriend = async (requesterId) => {
            const { error } = await supabase
                .from('friends')
                .update({ status: 'accepted' })
                .eq('user_id', requesterId)
                .eq('friend_id', currentUser.id);
            
            if (error) {
                alert('Error accepting friend: ' + error.message);
            } else {
                alert('Friend accepted!');
                await loadFriends();
                await loadChatFriends();
                await loadProfile();
            }
        };
        
        // Reject friend request
        window.rejectFriend = async (requesterId) => {
            const { error } = await supabase
                .from('friends')
                .delete()
                .eq('user_id', requesterId)
                .eq('friend_id', currentUser.id);
            
            if (error) {
                alert('Error rejecting friend: ' + error.message);
            } else {
                alert('Friend request rejected');
                await loadFriends();
            }
        };
        
        // Send friend request
        window.sendFriendRequest = async (friendId) => {
            const { error } = await supabase
                .from('friends')
                .insert({
                    user_id: currentUser.id,
                    friend_id: friendId,
                    status: 'pending'
                });
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Friend request sent!');
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchUsers').value = '';
            }
        };
        
        // Search users
        let searchTimeout;
        document.getElementById('searchUsers')?.addEventListener('input', async (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const searchTerm = e.target.value.toLowerCase();
                if (searchTerm.length < 2) {
                    document.getElementById('searchResults').innerHTML = '';
                    return;
                }
                
                const { data: users, error } = await supabase
                    .from('users')
                    .select('id, email')
                    .ilike('email', `%${searchTerm}%`)
                    .neq('id', currentUser.id)
                    .limit(5);
                
                if (error) {
                    console.error("Search error:", error);
                    document.getElementById('searchResults').innerHTML = '<div class="loading">Error searching</div>';
                    return;
                }
                
                if (users && users.length > 0) {
                    document.getElementById('searchResults').innerHTML = users.map(u => `
                        <div class="friend-card">
                            👤 ${escapeHtml(u.email.split('@')[0])}
                            <div class="friend-actions">
                                <button class="add-friend-btn" onclick="sendFriendRequest('${u.id}')">Add Friend</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('searchResults').innerHTML = '<div class="loading">No users found</div>';
                }
            }, 500);
        });
        
        // ============ PRIVATE CHAT FUNCTIONS ============
        async function loadChatFriends() {
            if (!currentUser) return;
            
            // Get all accepted friends
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            
            if (friendIds.length === 0) {
                document.getElementById('chatFriendsList').innerHTML = '<div class="loading">👥 Add friends first to start chatting!</div>';
                return;
            }
            
            const { data: friends } = await supabase
                .from('users')
                .select('id, email')
                .in('id', friendIds);
            
            document.getElementById('chatFriendsList').innerHTML = '<h3>Select a friend to chat:</h3>' + friends?.map(f => `
                <div class="friend-card chat-friend-item" onclick="selectChatFriend('${f.id}', '${escapeHtml(f.email.split('@')[0])}')">
                    👤 ${escapeHtml(f.email.split('@')[0])}
                </div>
            `).join('');
        }
        
        // Select a friend to chat with
        window.selectChatFriend = async (friendId, friendName) => {
            selectedChatFriend = { id: friendId, name: friendName };
            
            // Highlight selected friend
            document.querySelectorAll('.chat-friend-item').forEach(el => {
                el.classList.remove('selected-chat');
            });
            const selectedEl = Array.from(document.querySelectorAll('.chat-friend-item')).find(el => 
                el.getAttribute('onclick')?.includes(friendId)
            );
            if (selectedEl) selectedEl.classList.add('selected-chat');
            
            // Enable chat input
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendChatBtn').disabled = false;
            document.getElementById('chatInput').placeholder = `Message @${friendName}...`;
            
            // Load private messages
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">💬 Loading messages...</div>';
            
            const { data: messages, error } = await supabase
                .from('private_messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });
            
            if (error) {
                chatDiv.innerHTML = '<div class="loading">Error loading messages</div>';
                return;
            }
            
            if (!messages || messages.length === 0) {
                chatDiv.innerHTML = '<div class="loading">💬 No messages yet. Say hi!</div>';
                return;
            }
            
            let html = '';
            for (const msg of messages) {
                const isMe = msg.sender_id === currentUser.id;
                html += `
                    <div class="message-bubble" style="text-align: ${isMe ? 'right' : 'left'}; background: ${isMe ? '#FF006622' : '#1A1A24'};">
                        <strong>${isMe ? 'Me' : escapeHtml(friendName)}</strong>: ${escapeHtml(msg.text)}
                    </div>
                `;
            }
            chatDiv.innerHTML = html;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        
        // Send private message
        async function sendPrivateMessage() {
            if (!currentUser || !selectedChatFriend) {
                alert('Select a friend to chat with first!');
                return;
            }
            
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            const { error } = await supabase
                .from('private_messages')
                .insert({
                    sender_id: currentUser.id,
                    receiver_id: selectedChatFriend.id,
                    text: text
                });
            
            if (error) {
                alert('Message error: ' + error.message);
            } else {
                input.value = '';
                // Reload messages
                window.selectChatFriend(selectedChatFriend.id, selectedChatFriend.name);
            }
        }
        
        // ============ LOAD FEED WITH COMMENTS AND LIKES ============
        async function loadFeed() {
            const feedDiv = document.getElementById('feedList');
            if (!feedDiv) return;
            
            feedDiv.innerHTML = '<div class="loading">Loading posts...</div>';
            
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                feedDiv.innerHTML = `<div class="message error">Error: ${error.message}</div>`;
                return;
            }
            
            if (!posts || posts.length === 0) {
                feedDiv.innerHTML = '<div class="loading">✨ No posts yet. Be the first! ✨</div>';
                return;
            }
            
            // Get user's likes to check which posts they already liked
            const { data: userLikes } = currentUser ? await supabase
                .from('post_likes')
                .select('post_id')
                .eq('user_id', currentUser.id) : { data: [] };
            
            const likedPostIds = new Set(userLikes?.map(l => l.post_id) || []);
            
            let html = '';
            for (const post of posts) {
                // Get comments for this post
                const { data: comments } = await supabase
                    .from('comments')
                    .select('*')
                    .eq('post_id', post.id)
                    .order('created_at', { ascending: true });
                
                const hasLiked = likedPostIds.has(post.id);
                const likeButtonClass = hasLiked ? 'liked' : '';
                const likeButtonText = hasLiked ? '❤️ Liked' : `❤️ ${post.likes || 0} likes`;
                
                html += `
                    <div class="post-card" id="post-${post.id}">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image" alt="Post image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <button class="like-btn ${likeButtonClass}" data-id="${post.id}" data-has-liked="${hasLiked}">
                                ${likeButtonText}
                            </button>
                            <button class="comment-btn" data-id="${post.id}">💬 ${comments?.length || 0} comments</button>
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display:none">
                            <div id="comments-list-${post.id}">
                                ${comments?.map(c => `<div class="comment"><strong>${escapeHtml(c.user_name)}</strong>: ${escapeHtml(c.text)}</div>`).join('') || '<div class="comment">No comments yet</div>'}
                            </div>
                            <div class="comment-input">
                                <input type="text" id="comment-input-${post.id}" placeholder="Write a comment...">
                                <button class="submit-comment" data-id="${post.id}">Post</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            feedDiv.innerHTML = html;
            
            // Like button events (One like per user)
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.onclick = async function() {
                    const postId = parseInt(this.getAttribute('data-id'));
                    const hasLiked = this.getAttribute('data-has-liked') === 'true';
                    
                    if (hasLiked) {
                        // Unlike: remove from post_likes and decrement count
                        await supabase.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
                        const post = posts.find(p => p.id === postId);
                        await supabase.from('posts').update({ likes: (post?.likes || 0) - 1 }).eq('id', postId);
                    } else {
                        // Like: add to post_likes and increment count
                        await supabase.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
                        const post = posts.find(p => p.id === postId);
                        await supabase.from('posts').update({ likes: (post?.likes || 0) + 1 }).eq('id', postId);
                    }
                    loadFeed();
                };
            });
            
            // Comment toggle buttons
            document.querySelectorAll('.comment-btn').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const section = document.getElementById(`comments-${id}`);
                    section.style.display = section.style.display === 'none' ? 'block' : 'none';
                };
            });
            
            // Submit comment buttons
            document.querySelectorAll('.submit-comment').forEach(btn => {
                btn.onclick = async () => {
                    const postId = btn.getAttribute('data-id');
                    const input = document.getElementById(`comment-input-${postId}`);
                    const text = input.value.trim();
                    if (!text || !currentUser) return;
                    
                    await supabase.from('comments').insert({
                        post_id: parseInt(postId),
                        user_id: currentUser.id,
                        user_name: currentUser.email.split('@')[0],
                        text: text
                    });
                    input.value = '';
                    loadFeed();
                };
            });
        }
        
        // Load videos/reels
        async function loadVideos() {
            const videoDiv = document.getElementById('videoList');
            if (!videoDiv) return;
            
            videoDiv.innerHTML = '<div class="loading">Loading reels...</div>';
            
            const { data: posts, error } = await supabase
                .from('posts')
                .select('*')
                .not('video_url', 'is', null)
                .order('created_at', { ascending: false });
            
            if (error) {
                videoDiv.innerHTML = `<div class="message error">Error: ${error.message}</div>`;
                return;
            }
            
            if (!posts || posts.length === 0) {
                videoDiv.innerHTML = '<div class="loading">🎬 No reels yet. Upload a video!</div>';
                return;
            }
            
            let html = '';
            for (const post of posts) {
                html += `
                    <div class="post-card">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <video controls autoplay muted loop src="${post.video_url}"></video>
                        <div style="margin-top: 10px;"><strong>${escapeHtml(post.user_name)}</strong>: ${escapeHtml(post.text || '')} ❤️ ${post.likes || 0}</div>
                    </div>
                `;
            }
            videoDiv.innerHTML = html;
        }
        
        // Realtime subscriptions
        function subscribeToRealtime() {
            if (realtimeChannels.length > 0) return;
            
            const postsChannel = supabase
                .channel('posts-channel')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, () => {
                    loadFeed();
                    loadVideos();
                    loadProfile();
                })
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'comments' }, () => {
                    loadFeed();
                })
                .subscribe();
            
            // Subscribe to private messages
            const privateMessagesChannel = supabase
                .channel('private-messages-channel')
                .on('postgres_changes', { 
                    event: 'INSERT', 
                    schema: 'public', 
                    table: 'private_messages',
                    filter: `receiver_id=eq.${currentUser?.id}`
                }, () => {
                    if (selectedChatFriend) {
                        window.selectChatFriend(selectedChatFriend.id, selectedChatFriend.name);
                    }
                })
                .subscribe();
            
            realtimeChannels = [postsChannel, privateMessagesChannel];
        }
        
        function unsubscribeFromRealtime() {
            realtimeChannels.forEach(channel => {
                supabase.removeChannel(channel);
            });
            realtimeChannels = [];
        }
        
        // Set app state based on auth
        async function setAppState(session) {
            if (session && session.user) {
                currentUser = session.user;
                loginScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                loginMessage.innerHTML = '';
                
                await loadFeed();
                await loadVideos();
                await loadFriends();
                await loadProfile();
                await loadChatFriends();
                subscribeToRealtime();
            } else {
                currentUser = null;
                selectedChatFriend = null;
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
                unsubscribeFromRealtime();
            }
        }
        
        // Initialize auth
        async function initAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            await setAppState(session);
            
            supabase.auth.onAuthStateChange((event, session) => {
                setAppState(session);
            });
        }
        
        // Start the app
        initAuth();
        
        // Sign up button
        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage(loginMessage, 'Please enter email and password', 'error');
                return;
            }
            
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) {
                showMessage(loginMessage, error.message, 'error');
            } else {
                showMessage(loginMessage, 'Account created! You can now log in.', 'success');
            }
        };
        
        // Login button
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showMessage(loginMessage, 'Please enter email and password', 'error');
                return;
            }
            
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                showMessage(loginMessage, error.message, 'error');
            }
        };
        
        // Google login
        document.getElementById('googleBtn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' });
            if (error) {
                showMessage(loginMessage, error.message, 'error');
            }
        };
        
        // Logout button
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
        };
        
        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                const panelName = btn.getAttribute('data-panel');
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${panelName}Panel`).classList.add('active');
                
                if (panelName === 'friends') {
                    loadFriends();
                }
                if (panelName === 'profile') {
                    loadProfile();
                }
                if (panelName === 'chat') {
                    loadChatFriends();
                }
            };
        });
        
        // Create post
        document.getElementById('createPostBtn').onclick = async () => {
            if (!currentUser) {
                alert('Please sign in first!');
                return;
            }
            
            const text = document.getElementById('postText').value;
            const imageFile = document.getElementById('postImage').files[0];
            const videoFile = document.getElementById('postVideo').files[0];
            
            if (!text && !imageFile && !videoFile) {
                alert('Please enter text, select an image, or select a video!');
                return;
            }
            
            const btn = document.getElementById('createPostBtn');
            btn.innerText = '⏳ Uploading...';
            btn.disabled = true;
            
            let imageUrl = null;
            let videoUrl = null;
            
            // Upload image if selected
            if (imageFile) {
                const fileName = `image_${Date.now()}_${imageFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const { error: uploadError } = await supabase.storage
                    .from('framor-videos')
                    .upload(fileName, imageFile);
                
                if (uploadError) {
                    alert('Image upload failed: ' + uploadError.message);
                    btn.innerText = '✨ Post to FRAMOR';
                    btn.disabled = false;
                    return;
                }
                
                const { data: urlData } = supabase.storage
                    .from('framor-videos')
                    .getPublicUrl(fileName);
                imageUrl = urlData.publicUrl;
            }
            
            // Upload video if selected
            if (videoFile) {
                const fileName = `video_${Date.now()}_${videoFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const { error: uploadError } = await supabase.storage
                    .from('framor-videos')
                    .upload(fileName, videoFile);
                
                if (uploadError) {
                    alert('Video upload failed: ' + uploadError.message);
                    btn.innerText = '✨ Post to FRAMOR';
                    btn.disabled = false;
                    return;
                }
                
                const { data: urlData } = supabase.storage
                    .from('framor-videos')
                    .getPublicUrl(fileName);
                videoUrl = urlData.publicUrl;
            }
            
            const { error } = await supabase
                .from('posts')
                .insert({
                    user_id: currentUser.id,
                    user_name: currentUser.email.split('@')[0],
                    text: text || '',
                    image_url: imageUrl,
                    video_url: videoUrl,
                    likes: 0
                });
            
            btn.innerText = '✨ Post to FRAMOR';
            btn.disabled = false;
            
            if (error) {
                alert('Post error: ' + error.message);
            } else {
                document.getElementById('postText').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('postVideo').value = '';
                await loadFeed();
                await loadVideos();
                await loadProfile();
                alert(imageUrl ? '✅ Image posted!' : videoUrl ? '✅ Video posted!' : '✅ Post created!');
            }
        };
        
        // Send private chat message
        document.getElementById('sendChatBtn').onclick = sendPrivateMessage;
        
        // Allow Enter key to send message
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendPrivateMessage();
            }
        });
    })();
</script>
</body>
</html>
