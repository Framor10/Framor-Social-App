<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FRAMOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0A0A0F;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            color: #FFFFFF;
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1A0033 0%, #330066 50%, #6600CC 100%);
            width: 100%;
            max-width: 500px;
        }

        #loginScreen h1 {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF0066, #FFCC00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        #loginForm {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
        }

        #loginForm input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
        }

        #loginForm input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        #loginForm button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #googleBtn {
            background: white !important;
            color: #6600CC !important;
        }

        #mainApp {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: #0A0A0F;
        }

        .framor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #0A0A0F;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF0066, #FFCC00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-bar {
            display: flex;
            background: #0A0A0F;
            padding: 8px 16px;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #888;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
        }

        .panel {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .panel.active {
            display: block;
        }

        .post-card, .message-bubble, .friend-card, .profile-card {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Friend card clickable style */
        .friend-card-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .friend-card-clickable:hover {
            background: rgba(255, 102, 0, 0.3);
            transform: scale(1.01);
        }

        .timeline-header {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            padding: 30px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .timeline-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1A1A24;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 40px;
        }
        .timeline-name {
            font-size: 24px;
            font-weight: bold;
        }
        .timeline-bio {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        .timeline-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }
        .timeline-stat {
            text-align: center;
        }
        .timeline-stat-number {
            font-size: 20px;
            font-weight: bold;
        }
        .timeline-stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .back-to-profile-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
            display: inline-block;
        }
        .back-to-profile-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .post-user {
            color: #FF6600;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .post-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: #FF0066;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
        }

        .comment-btn {
            color: #FFCC00;
        }

        .comments-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .comment {
            padding: 8px 0;
            font-size: 13px;
            color: #aaa;
        }

        .comment strong {
            color: #FF6600;
        }

        .comment-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .comment-input input {
            flex: 1;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
        }

        .comment-input button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #1A1A24;
            border-radius: 30px;
            margin-top: 12px;
            position: sticky;
            bottom: 0;
        }

        .chat-input-container input {
            flex: 1;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 30px;
            color: white;
        }

        .chat-input-container button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .create-post {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .create-post textarea, .create-post input {
            width: 100%;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 16px;
            color: white;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .create-post button {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        .logout-btn, .edit-profile-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .edit-profile-btn {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            margin-top: 16px;
        }

        video, .post-image, .profile-avatar {
            width: 100%;
            border-radius: 16px;
            margin-top: 8px;
        }

        .post-image {
            max-height: 400px;
            object-fit: cover;
        }

        .profile-info {
            text-align: center;
        }

        .profile-info h3 {
            margin-bottom: 8px;
        }

        .profile-info p {
            color: #aaa;
            margin-bottom: 8px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
            padding: 16px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #FF6600;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            text-align: center;
        }

        .error {
            background: rgba(255, 0, 102, 0.2);
            color: #FF0066;
        }

        .success {
            background: rgba(0, 255, 102, 0.2);
            color: #00FF66;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .search-box, .profile-input {
            width: 100%;
            padding: 12px;
            background: #1A1A24;
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            margin-bottom: 16px;
        }

        .profile-input {
            margin-bottom: 12px;
        }

        .friend-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .accept-btn, .reject-btn, .add-friend-btn {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 12px;
        }

        .accept-btn {
            background: #00FF66;
            color: black;
        }

        .reject-btn {
            background: #FF0066;
            color: white;
        }

        .add-friend-btn {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
        }

        h3 {
            margin: 20px 0 10px;
            font-size: 16px;
        }

        .chat-friend-item {
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-friend-item:hover {
            background: rgba(255, 102, 0, 0.2);
        }

        .selected-chat {
            background: rgba(255, 102, 0, 0.3);
            border: 1px solid #FF6600;
        }

        .liked {
            color: #FF0066;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div id="loginScreen">
    <h1>FRAMOR</h1>
    <p>Connect differently ✨</p>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="signupBtn">Create Account</button>
        <button id="loginBtn">Sign In</button>
        <button id="googleBtn">🚀 Sign in with Google</button>
    </div>
    <div id="loginMessage"></div>
</div>

<div id="mainApp">
    <div class="framor-header">
        <div class="logo">FRAMOR</div>
        <button class="logout-btn" id="logoutBtn">Exit</button>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" data-panel="feed">📱 Feed</button>
        <button class="nav-item" data-panel="videos">🎵 Reels</button>
        <button class="nav-item" data-panel="friends">👥 Friends</button>
        <button class="nav-item" data-panel="profile">👤 Profile</button>
        <button class="nav-item" data-panel="chat">💬 Chat</button>
    </div>

    <div id="feedPanel" class="panel active">
        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind? 🔥" rows="2"></textarea>
            <input type="file" id="postImage" accept="image/*" placeholder="📸 Image">
            <input type="file" id="postVideo" accept="video/*" placeholder="🎥 Video">
            <button id="createPostBtn">✨ Post to FRAMOR</button>
        </div>
        <div id="feedList"></div>
    </div>

    <div id="videosPanel" class="panel">
        <div id="videoList"></div>
    </div>

    <div id="friendsPanel" class="panel">
        <input type="text" id="searchUsers" class="search-box" placeholder="🔍 Search users to add...">
        <div id="searchResults"></div>
        <h3>👥 My Friends</h3>
        <div id="friendsList"></div>
        <h3>📨 Friend Requests</h3>
        <div id="friendRequests"></div>
    </div>

    <div id="profilePanel" class="panel">
        <div id="profileContent">
            <!-- This will be dynamically filled with either own profile or friend's timeline -->
        </div>
    </div>

    <div id="chatPanel" class="panel">
        <div id="chatFriendsList"></div>
        <div id="chatMessages" style="max-height: 50vh; overflow-y: auto; margin-top: 16px;"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Select a friend to chat..." disabled>
            <button id="sendChatBtn" disabled>Send</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = "https://pknztsbadizlcnlzppch.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_Qvi0piL5vNk-734kukD5GA_WtC6nSvb";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let realtimeChannels = [];
        let selectedChatFriend = null;
        let viewingUserId = null; // Track whose profile we're viewing
        
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const loginMessage = document.getElementById('loginMessage');
        
        function showMessage(element, text, type) {
            if (!element) return;
            element.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                if (element.innerHTML === `<div class="message ${type}">${text}</div>`) {
                    element.innerHTML = '';
                }
            }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ============ TIMELINE / PROFILE VIEW ============
        async function showUserTimeline(userId, userName) {
            console.log("Showing timeline for:", userId, userName);
            viewingUserId = userId;
            const isOwnProfile = (userId === currentUser?.id);
            
            // Get user profile
            let { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('id', userId)
                .single();
            
            if (!profile) {
                profile = { display_name: userName, bio: 'No bio yet', location: '', website: '' };
            }
            
            // Get user's posts
            const { data: userPosts } = await supabase
                .from('posts')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });
            
            // Get friends count for this user
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${userId},friend_id.eq.${userId}`)
                .eq('status', 'accepted');
            
            const friendsCount = friendships?.length || 0;
            const postsCount = userPosts?.length || 0;
            const displayName = profile.display_name || userName;
            
            // Build timeline HTML
            let timelineHtml = `
                <div class="timeline-header">
                    <div class="timeline-avatar">👤</div>
                    <div class="timeline-name">${escapeHtml(displayName)}</div>
                    <div class="timeline-bio">${escapeHtml(profile.bio || 'No bio yet')}</div>
                    ${profile.location ? `<div class="timeline-bio">📍 ${escapeHtml(profile.location)}</div>` : ''}
                    <div class="timeline-stats">
                        <div class="timeline-stat">
                            <div class="timeline-stat-number">${postsCount}</div>
                            <div class="timeline-stat-label">Posts</div>
                        </div>
                        <div class="timeline-stat">
                            <div class="timeline-stat-number">${friendsCount}</div>
                            <div class="timeline-stat-label">Friends</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Add back button if viewing someone else's profile
            if (!isOwnProfile) {
                timelineHtml = `<button class="back-to-profile-btn" onclick="window.goToMyProfile()">← Back to My Profile</button>` + timelineHtml;
                timelineHtml += `<h3 style="margin-top: 20px;">📝 ${escapeHtml(displayName)}'s Posts</h3>`;
            } else {
                timelineHtml += `<div style="margin-top: 20px;"><button class="edit-profile-btn" id="editProfileBtn">✏️ Edit Profile</button></div>`;
                timelineHtml += `<h3 style="margin-top: 20px;">📝 My Posts</h3>`;
            }
            
            // Add posts
            if (userPosts && userPosts.length > 0) {
                timelineHtml += userPosts.map(post => `
                    <div class="post-card">
                        <div class="post-user">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <span>❤️ ${post.likes || 0} likes</span>
                        </div>
                    </div>
                `).join('');
            } else {
                timelineHtml += '<div class="loading">No posts yet</div>';
            }
            
            document.getElementById('profileContent').innerHTML = timelineHtml;
            
            // If it's own profile, attach edit button event
            if (isOwnProfile) {
                document.getElementById('editProfileBtn')?.addEventListener('click', () => {
                    showEditProfileForm();
                });
            }
        }
        
        // Edit profile form
        async function showEditProfileForm() {
            let { data: profile } = await supabase
                .from('user_profiles')
                .select('*')
                .eq('id', currentUser.id)
                .single();
            
            if (!profile) {
                profile = { display_name: '', bio: '', location: '', website: '' };
            }
            
            const editHtml = `
                <div class="profile-card">
                    <h3>Edit Profile</h3>
                    <input type="text" id="editDisplayName" class="search-box" placeholder="Display Name" value="${escapeHtml(profile.display_name || '')}">
                    <textarea id="editBio" class="search-box" rows="3" placeholder="Bio">${escapeHtml(profile.bio || '')}</textarea>
                    <input type="text" id="editLocation" class="search-box" placeholder="Location" value="${escapeHtml(profile.location || '')}">
                    <input type="text" id="editWebsite" class="search-box" placeholder="Website" value="${escapeHtml(profile.website || '')}">
                    <button id="saveProfileBtn" class="edit-profile-btn">💾 Save Changes</button>
                    <button id="cancelEditBtn" class="logout-btn" style="margin-top: 8px;">Cancel</button>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = editHtml;
            
            document.getElementById('saveProfileBtn').onclick = async () => {
                const displayName = document.getElementById('editDisplayName').value;
                const bio = document.getElementById('editBio').value;
                const location = document.getElementById('editLocation').value;
                const website = document.getElementById('editWebsite').value;
                
                const { error } = await supabase
                    .from('user_profiles')
                    .update({
                        display_name: displayName,
                        bio: bio,
                        location: location,
                        website: website,
                        updated_at: new Date()
                    })
                    .eq('id', currentUser.id);
                
                if (error) {
                    alert('Error updating profile: ' + error.message);
                } else {
                    alert('Profile updated successfully!');
                    showUserTimeline(currentUser.id, currentUser.email.split('@')[0]);
                }
            };
            
            document.getElementById('cancelEditBtn').onclick = () => {
                showUserTimeline(currentUser.id, currentUser.email.split('@')[0]);
            };
        }
        
        // Go to my profile
        window.goToMyProfile = function() {
            showUserTimeline(currentUser.id, currentUser.email.split('@')[0]);
        };
        
        // View friend's timeline
        window.viewFriendTimeline = function(friendId, friendName) {
            showUserTimeline(friendId, friendName);
            // Switch to profile panel
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-panel="profile"]').classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('profilePanel').classList.add('active');
        };
        
        // ============ FRIENDS FUNCTIONS ============
        async function loadFriends() {
            if (!currentUser) return;
            
            const { data: friendships } = await supabase
                .from('friends')
                .select('*')
                .or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`)
                .eq('status', 'accepted');
            
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            
            if (friendIds.length > 0) {
                const { data: friends } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', friendIds);
                
                document.getElementById('friendsList').innerHTML = friends?.map(f => `
                    <div class="friend-card friend-card-clickable" onclick="window.viewFriendTimeline('${f.id}', '${escapeHtml(f.email.split('@')[0])}')">
                        👤 ${escapeHtml(f.email.split('@')[0])}
                        <div style="font-size: 12px; color: #FF6600; margin-top: 5px;">Click to view profile →</div>
                    </div>
                `).join('') || '<div class="loading">No friends yet</div>';
            } else {
                document.getElementById('friendsList').innerHTML = '<div class="loading">No friends yet. Search above!</div>';
            }
            
            const { data: requests } = await supabase
                .from('friends')
                .select('*')
                .eq('friend_id', currentUser.id)
                .eq('status', 'pending');
            
            if (requests && requests.length > 0) {
                const requesterIds = requests.map(r => r.user_id);
                const { data: requesters } = await supabase
                    .from('users')
                    .select('id, email')
                    .in('id', requesterIds);
                
                document.getElementById('friendRequests').innerHTML = requesters?.map(r => `
                    <div class="friend-card">
                        👤 ${escapeHtml(r.email.split('@')[0])}
                        <div class="friend-actions">
                            <button class="accept-btn" onclick="acceptFriend('${r.id}')">Accept</button>
                            <button class="reject-btn" onclick="rejectFriend('${r.id}')">Reject</button>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('friendRequests').innerHTML = '<div class="loading">No pending requests</div>';
            }
        }
        
        window.acceptFriend = async (requesterId) => {
            await supabase.from('friends').update({ status: 'accepted' }).eq('user_id', requesterId).eq('friend_id', currentUser.id);
            await loadFriends();
            await loadChatFriends();
            alert('Friend accepted!');
        };
        
        window.rejectFriend = async (requesterId) => {
            await supabase.from('friends').delete().eq('user_id', requesterId).eq('friend_id', currentUser.id);
            await loadFriends();
            alert('Friend request rejected');
        };
        
        window.sendFriendRequest = async (friendId) => {
            const { error } = await supabase.from('friends').insert({ user_id: currentUser.id, friend_id: friendId, status: 'pending' });
            if (error) alert('Error: ' + error.message);
            else {
                alert('Friend request sent!');
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchUsers').value = '';
            }
        };
        
        let searchTimeout;
        document.getElementById('searchUsers')?.addEventListener('input', async (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                const searchTerm = e.target.value.toLowerCase();
                if (searchTerm.length < 2) { document.getElementById('searchResults').innerHTML = ''; return; }
                const { data: users } = await supabase.from('users').select('id, email').ilike('email', `%${searchTerm}%`).neq('id', currentUser.id).limit(5);
                if (users && users.length > 0) {
                    document.getElementById('searchResults').innerHTML = users.map(u => `
                        <div class="friend-card">
                            👤 ${escapeHtml(u.email.split('@')[0])}
                            <div class="friend-actions">
                                <button class="add-friend-btn" onclick="sendFriendRequest('${u.id}')">Add Friend</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('searchResults').innerHTML = '<div class="loading">No users found</div>';
                }
            }, 500);
        });
        
        // ============ CHAT FUNCTIONS ============
        async function loadChatFriends() {
            if (!currentUser) return;
            const { data: friendships } = await supabase.from('friends').select('*').or(`user_id.eq.${currentUser.id},friend_id.eq.${currentUser.id}`).eq('status', 'accepted');
            const friendIds = friendships?.map(f => f.user_id === currentUser.id ? f.friend_id : f.user_id) || [];
            if (friendIds.length === 0) { document.getElementById('chatFriendsList').innerHTML = '<div class="loading">👥 Add friends first to start chatting!</div>'; return; }
            const { data: friends } = await supabase.from('users').select('id, email').in('id', friendIds);
            document.getElementById('chatFriendsList').innerHTML = '<h3>Select a friend to chat:</h3>' + friends?.map(f => `
                <div class="friend-card chat-friend-item" onclick="selectChatFriend('${f.id}', '${escapeHtml(f.email.split('@')[0])}')">
                    👤 ${escapeHtml(f.email.split('@')[0])}
                </div>
            `).join('');
        }
        
        window.selectChatFriend = async (friendId, friendName) => {
            selectedChatFriend = { id: friendId, name: friendName };
            document.querySelectorAll('.chat-friend-item').forEach(el => el.classList.remove('selected-chat'));
            const selectedEl = Array.from(document.querySelectorAll('.chat-friend-item')).find(el => el.getAttribute('onclick')?.includes(friendId));
            if (selectedEl) selectedEl.classList.add('selected-chat');
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendChatBtn').disabled = false;
            document.getElementById('chatInput').placeholder = `Message @${friendName}...`;
            const chatDiv = document.getElementById('chatMessages');
            chatDiv.innerHTML = '<div class="loading">💬 Loading messages...</div>';
            const { data: messages } = await supabase.from('private_messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUser.id})`).order('created_at', { ascending: true });
            if (!messages || messages.length === 0) { chatDiv.innerHTML = '<div class="loading">💬 No messages yet. Say hi!</div>'; return; }
            chatDiv.innerHTML = messages.map(msg => `<div class="message-bubble" style="text-align: ${msg.sender_id === currentUser.id ? 'right' : 'left'}; background: ${msg.sender_id === currentUser.id ? '#FF006622' : '#1A1A24'}"><strong>${msg.sender_id === currentUser.id ? 'Me' : friendName}</strong>: ${escapeHtml(msg.text)}</div>`).join('');
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        
        async function sendPrivateMessage() {
            if (!currentUser || !selectedChatFriend) { alert('Select a friend to chat with first!'); return; }
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            await supabase.from('private_messages').insert({ sender_id: currentUser.id, receiver_id: selectedChatFriend.id, text: text });
            input.value = '';
            selectChatFriend(selectedChatFriend.id, selectedChatFriend.name);
        }
        
        // ============ FEED ============
        async function loadFeed() {
            const feedDiv = document.getElementById('feedList');
            feedDiv.innerHTML = '<div class="loading">Loading posts...</div>';
            const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (!posts || posts.length === 0) { feedDiv.innerHTML = '<div class="loading">✨ No posts yet. Be the first! ✨</div>'; return; }
            const { data: userLikes } = currentUser ? await supabase.from('post_likes').select('post_id').eq('user_id', currentUser.id) : { data: [] };
            const likedPostIds = new Set(userLikes?.map(l => l.post_id) || []);
            let html = '';
            for (const post of posts) {
                const { data: comments } = await supabase.from('comments').select('*').eq('post_id', post.id).order('created_at', { ascending: true });
                const hasLiked = likedPostIds.has(post.id);
                html += `
                    <div class="post-card">
                        <div class="post-user" onclick="window.viewFriendTimeline('${post.user_id}', '${escapeHtml(post.user_name)}')" style="cursor:pointer;">👤 ${escapeHtml(post.user_name)}</div>
                        <div>${escapeHtml(post.text || '')}</div>
                        ${post.image_url ? `<img src="${post.image_url}" class="post-image">` : ''}
                        ${post.video_url ? `<video controls src="${post.video_url}"></video>` : ''}
                        <div class="post-stats">
                            <button class="like-btn" data-id="${post.id}" data-has-liked="${hasLiked}">${hasLiked ? '❤️ Liked' : `❤️ ${post.likes || 0} likes`}</button>
                            <button class="comment-btn" data-id="${post.id}">💬 ${comments?.length || 0} comments</button>
                        </div>
                        <div class="comments-section" id="comments-${post.id}" style="display:none">
                            <div id="comments-list-${post.id}">${comments?.map(c => `<div class="comment"><strong>${escapeHtml(c.user_name)}</strong>: ${escapeHtml(c.text)}</div>`).join('') || '<div class="comment">No comments yet</div>'}</div>
                            <div class="comment-input"><input type="text" id="comment-input-${post.id}" placeholder="Write a comment..."><button class="submit-comment" data-id="${post.id}">Post</button></div>
                        </div>
                    </div>
                `;
            }
            feedDiv.innerHTML = html;
            document.querySelectorAll('.like-btn').forEach(btn => { btn.onclick = async function() {
                const postId = parseInt(this.dataset.id);
                const hasLiked = this.dataset.hasLiked === 'true';
                if (hasLiked) { await supabase.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id); const post = posts.find(p => p.id === postId); await supabase.from('posts').update({ likes: (post?.likes || 0) - 1 }).eq('id', postId); }
                else { await supabase.from('post_likes').insert({ post_id: postId, user_id: currentUser.id }); const post = posts.find(p => p.id === postId); await supabase.from('posts').update({ likes: (post?.likes || 0) + 1 }).eq('id', postId); }
                loadFeed();
            }; });
            document.querySelectorAll('.comment-btn').forEach(btn => { btn.onclick = () => { const id = btn.dataset.id; const section = document.getElementById(`comments-${id}`); section.style.display = section.style.display === 'none' ? 'block' : 'none'; }; });
            document.querySelectorAll('.submit-comment').forEach(btn => { btn.onclick = async () => {
                const postId = btn.dataset.id;
                const input = document.getElementById(`comment-input-${postId}`);
                const text = input.value.trim();
                if (!text || !currentUser) return;
                await supabase.from('comments').insert({ post_id: parseInt(postId), user_id: currentUser.id, user_name: currentUser.email.split('@')[0], text: text });
                input.value = ''; loadFeed();
            }; });
        }
        
        async function loadVideos() {
            const videoDiv = document.getElementById('videoList');
            videoDiv.innerHTML = '<div class="loading">Loading reels...</div>';
            const { data: posts } = await supabase.from('posts').select('*').not('video_url', 'is', null).order('created_at', { ascending: false });
            if (!posts || posts.length === 0) { videoDiv.innerHTML = '<div class="loading">🎬 No reels yet. Upload a video!</div>'; return; }
            videoDiv.innerHTML = posts.map(post => `<div class="post-card"><div class="post-user" onclick="window.viewFriendTimeline('${post.user_id}', '${escapeHtml(post.user_name)}')" style="cursor:pointer;">👤 ${escapeHtml(post.user_name)}</div><video controls autoplay muted loop src="${post.video_url}"></video><div>${escapeHtml(post.text || '')} ❤️ ${post.likes || 0}</div></div>`).join('');
        }
        
        document.getElementById('createPostBtn').onclick = async () => {
            if (!currentUser) { alert('Please sign in first!'); return; }
            const text = document.getElementById('postText').value;
            const imageFile = document.getElementById('postImage').files[0];
            const videoFile = document.getElementById('postVideo').files[0];
            if (!text && !imageFile && !videoFile) { alert('Enter text or select media!'); return; }
            const btn = document.getElementById('createPostBtn');
            btn.innerText = '⏳ Uploading...';
            btn.disabled = true;
            let imageUrl = null, videoUrl = null;
            if (imageFile) {
                const fileName = `img_${Date.now()}_${imageFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const { error } = await supabase.storage.from('framor-videos').upload(fileName, imageFile);
                if (!error) imageUrl = supabase.storage.from('framor-videos').getPublicUrl(fileName).data.publicUrl;
            }
            if (videoFile) {
                const fileName = `vid_${Date.now()}_${videoFile.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
                const { error } = await supabase.storage.from('framor-videos').upload(fileName, videoFile);
                if (!error) videoUrl = supabase.storage.from('framor-videos').getPublicUrl(fileName).data.publicUrl;
            }
            const { error } = await supabase.from('posts').insert({ user_id: currentUser.id, user_name: currentUser.email.split('@')[0], text: text || '', image_url: imageUrl, video_url: videoUrl, likes: 0 });
            btn.innerText = '✨ Post to FRAMOR';
            btn.disabled = false;
            if (error) alert('Error: ' + error.message);
            else {
                document.getElementById('postText').value = '';
                document.getElementById('postImage').value = '';
                document.getElementById('postVideo').value = '';
                loadFeed();
                loadVideos();
                alert('Posted!');
            }
        };
        
        // ============ AUTH ============
        document.getElementById('signupBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            document.getElementById('loginMessage').innerHTML = error ? `<div class="error">${error.message}</div>` : '<div class="success">Account created! Login now.</div>';
        };
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('loginMessage').innerHTML = `<div class="error">${error.message}</div>`;
        };
        document.getElementById('googleBtn').onclick = async () => { await supabase.auth.signInWithOAuth({ provider: 'google' }); };
        document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); };
        document.getElementById('sendChatBtn').onclick = sendPrivateMessage;
        document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
        
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.onclick = () => {
                const panel = btn.dataset.panel;
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${panel}Panel`).classList.add('active');
                if (panel === 'friends') loadFriends();
                if (panel === 'profile') showUserTimeline(currentUser.id, currentUser.email.split('@')[0]);
                if (panel === 'chat') loadChatFriends();
            };
        });
        
        async function setAppState(session) {
            if (session?.user) {
                currentUser = session.user;
                loginScreen.style.display = 'none';
                mainApp.style.display = 'flex';
                await loadFeed();
                await loadVideos();
                await loadFriends();
                await showUserTimeline(currentUser.id, currentUser.email.split('@')[0]);
                await loadChatFriends();
            } else {
                currentUser = null;
                loginScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
        }
        
        supabase.auth.getSession().then(({ data: { session } }) => setAppState(session));
        supabase.auth.onAuthStateChange((event, session) => setAppState(session));
    })();
</script>
</body>
</html>
