<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAMOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0A0A0F;
            height: 100vh;
            display: flex;
            justify-content: center;
            color: #FFFFFF;
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1A0033 0%, #330066 50%, #6600CC 100%);
        }

        #loginScreen h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        #loginForm {
            width: 100%;
            max-width: 300px;
            margin-top: 30px;
        }

        #loginForm input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        #loginForm button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #mainApp {
            display: none;
            width: 100%;
            max-width: 500px;
        }

        .framor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(10, 10, 15, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .nav-bar {
            display: flex;
            background: rgba(10, 10, 15, 0.95);
            padding: 8px 16px;
            gap: 8px;
        }

        .nav-item {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #888;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-item.active {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            color: white;
        }

        .panel {
            display: none;
            padding: 16px;
            height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .panel.active {
            display: block;
        }

        .post-card, .message-bubble {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .create-post {
            background: #1A1A24;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .create-post textarea, .create-post input {
            width: 100%;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 16px;
            color: white;
            margin-bottom: 12px;
        }

        .create-post button, .logout-btn {
            background: linear-gradient(135deg, #FF0066, #FF6600);
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #1A1A24;
            border-radius: 30px;
            margin-top: 12px;
        }

        .chat-input-container input {
            flex: 1;
            background: #0A0A0F;
            border: 1px solid #333;
            padding: 12px;
            border-radius: 30px;
            color: white;
        }

        button {
            cursor: pointer;
        }
        
        .error-msg {
            color: #FF0066;
            margin-top: 10px;
        }
        
        .success-msg {
            color: #00FF66;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div id="loginScreen">
    <h1>FRAMOR</h1>
    <p>Connect differently ✨</p>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button id="signupBtn">Create Account</button>
        <button id="loginBtn">Sign In</button>
        <button id="googleBtn">🚀 Sign in with Google</button>
    </div>
    <div id="loginMessage"></div>
</div>

<div id="mainApp">
    <div class="framor-header">
        <div class="logo">FRAMOR</div>
        <button class="logout-btn" id="logoutBtn">Exit</button>
    </div>

    <div class="nav-bar">
        <button class="nav-item active" data-panel="feed">📱 Feed</button>
        <button class="nav-item" data-panel="videos">🎵 Reels</button>
        <button class="nav-item" data-panel="chat">💬 Chat</button>
    </div>

    <div id="feedPanel" class="panel active">
        <div class="create-post">
            <textarea id="postText" placeholder="What's on your mind? 🔥" rows="2"></textarea>
            <input type="file" id="postVideo" accept="video/*">
            <button id="createPostBtn">✨ Post to FRAMOR</button>
        </div>
        <div id="feedList">Loading posts...</div>
    </div>

    <div id="videosPanel" class="panel">
        <div id="videoList">Loading reels...</div>
    </div>

    <div id="chatPanel" class="panel">
        <div id="chatMessages" style="height: 70vh; overflow-y: auto;">Loading messages...</div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Type your message...">
            <button id="sendChatBtn">Send</button>
        </div>
    </div>
</div>

<script>
    // ONLY ONE DECLARATION - NO DUPLICATES
    const SUPABASE_URL = "https://pknztsbadizlcnlzppch.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Qvi0piL5vNk-734kukD5GA_WtC6nSvb";
    
    console.log("Starting FRAMOR app...");
    
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let _currentUser = null;
    let _realtimeChannels = [];

    const loginScreen = document.getElementById('loginScreen');
    const mainApp = document.getElementById('mainApp');
    const loginMessage = document.getElementById('loginMessage');

    async function setAppState(session) {
        console.log("Auth state:", session?.user?.email || "No user");
        
        if (session?.user) {
            _currentUser = session.user;
            loginScreen.style.display = 'none';
            mainApp.style.display = 'flex';
            loginMessage.innerHTML = '';
            await loadFeed();
            await loadVideos();
            await loadChat();
            subscribeToRealtime();
        } else {
            _currentUser = null;
            loginScreen.style.display = 'flex';
            mainApp.style.display = 'none';
            unsubscribeFromRealtime();
        }
    }

    async function initAuth() {
        const { data: { session } } = await _supabase.auth.getSession();
        await setAppState(session);
        _supabase.auth.onAuthStateChange((_event, session) => {
            setAppState(session);
        });
    }

    function unsubscribeFromRealtime() {
        _realtimeChannels.forEach(channel => {
            _supabase.removeChannel(channel);
        });
        _realtimeChannels = [];
    }

    initAuth();

    // Sign Up
    document.getElementById('signupBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            loginMessage.innerHTML = '<div class="error-msg">Please enter email and password</div>';
            return;
        }
        
        loginMessage.innerHTML = '<div class="success-msg">Creating account...</div>';
        
        const { data, error } = await _supabase.auth.signUp({ email, password });
        if (error) {
            loginMessage.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
        } else {
            loginMessage.innerHTML = '<div class="success-msg">Account created! Check your email or try logging in.</div>';
        }
    };

    // Sign In
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            loginMessage.innerHTML = '<div class="error-msg">Please enter email and password</div>';
            return;
        }
        
        loginMessage.innerHTML = '<div class="success-msg">Logging in...</div>';
        
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
        if (error) {
            loginMessage.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
        }
    };

    // Google Sign In
    document.getElementById('googleBtn').onclick = async () => {
        const { data, error } = await _supabase.auth.signInWithOAuth({
            provider: 'google'
        });
        if (error) {
            loginMessage.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
        }
    };

    document.getElementById('logoutBtn').onclick = async () => {
        await _supabase.auth.signOut();
    };

    // Navigation
    document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
            const panelName = btn.getAttribute('data-panel');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${panelName}Panel`).classList.add('active');
        };
    });

    async function loadFeed() {
        const feedDiv = document.getElementById('feedList');
        feedDiv.innerHTML = 'Loading posts...';
        
        const { data: posts, error } = await _supabase
            .from('posts')
            .select('*')
            .order('created_at', { ascending: false });
        
        if (error) {
            feedDiv.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
            return;
        }
        
        if (!posts?.length) {
            feedDiv.innerHTML = '<div style="text-align:center; color:#888;">No posts yet. Be the first! 🔥</div>';
            return;
        }
        
        feedDiv.innerHTML = posts.map(post => `
            <div class="post-card">
                <div style="color: #FF6600; font-weight: bold;">👤 ${post.user_name}</div>
                <div>${post.text || ''}</div>
                ${post.video_url ? `<video controls src="${post.video_url}" style="width:100%; margin-top:8px;"></video>` : ''}
                <button class="like-btn" data-id="${post.id}" style="background:none; border:none; color:#FF0066; margin-top:8px;">❤️ ${post.likes || 0}</button>
            </div>
        `).join('');
        
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.onclick = async () => {
                const id = btn.getAttribute('data-id');
                const post = posts.find(p => String(p.id) === id);
                const newLikes = (post?.likes || 0) + 1;
                await _supabase.from('posts').update({ likes: newLikes }).eq('id', id);
                await loadFeed();
            };
        });
    }

    async function loadVideos() {
        const videoDiv = document.getElementById('videoList');
        videoDiv.innerHTML = 'Loading reels...';
        
        const { data: posts, error } = await _supabase
            .from('posts')
            .select('*')
            .not('video_url', 'is', null)
            .order('created_at', { ascending: false });
        
        if (error) {
            videoDiv.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
            return;
        }
        
        if (!posts?.length) {
            videoDiv.innerHTML = '<div style="text-align:center; color:#888;">No reels yet. Upload a video! 🎬</div>';
            return;
        }
        
        videoDiv.innerHTML = posts.map(post => `
            <div class="post-card">
                <video controls autoplay muted loop src="${post.video_url}" style="width:100%;"></video>
                <div style="margin-top:8px;"><strong>${post.user_name}</strong>: ${post.text || ''} ❤️ ${post.likes || 0}</div>
            </div>
        `).join('');
    }

    async function loadChat() {
        const chatDiv = document.getElementById('chatMessages');
        chatDiv.innerHTML = 'Loading messages...';
        
        const { data: messages, error } = await _supabase
            .from('messages')
            .select('*')
            .order('created_at', { ascending: true });
        
        if (error) {
            chatDiv.innerHTML = `<div class="error-msg">Error: ${error.message}</div>`;
            return;
        }
        
        if (!messages?.length) {
            chatDiv.innerHTML = '<div style="text-align:center; color:#888;">No messages yet. Start the conversation! 💬</div>';
            return;
        }
        
        chatDiv.innerHTML = messages.map(msg => `
            <div class="message-bubble">
                <strong>${msg.user_name}</strong>: ${msg.text}
            </div>
        `).join('');
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    function subscribeToRealtime() {
        if (_realtimeChannels.length) return;

        const messagesChannel = _supabase
            .channel('messages-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, () => loadChat())
            .subscribe();
        
        const postsChannel = _supabase
            .channel('posts-channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, () => {
                loadFeed();
                loadVideos();
            })
            .subscribe();

        _realtimeChannels = [messagesChannel, postsChannel];
    }

    document.getElementById('createPostBtn').onclick = async () => {
        if (!_currentUser) {
            alert('Please sign in first!');
            return;
        }

        const text = document.getElementById('postText').value;
        const videoFile = document.getElementById('postVideo').files[0];
        
        let videoUrl = null;
        if (videoFile) {
            const fileName = `${Date.now()}_${videoFile.name}`;
            const { error: uploadError } = await _supabase.storage
                .from('framor-videos')
                .upload(fileName, videoFile);
            
            if (uploadError) {
                alert('Upload failed: ' + uploadError.message);
                return;
            }
            
            const { data: urlData } = _supabase.storage
                .from('framor-videos')
                .getPublicUrl(fileName);
            videoUrl = urlData.publicUrl;
        }
        
        const { error } = await _supabase
            .from('posts')
            .insert({
                user_id: _currentUser.id,
                user_name: _currentUser.email.split('@')[0],
                text: text,
                video_url: videoUrl,
                likes: 0
            });
        
        if (error) {
            alert('Post error: ' + error.message);
        } else {
            document.getElementById('postText').value = '';
            document.getElementById('postVideo').value = '';
            await loadFeed();
            await loadVideos();
        }
    };

    document.getElementById('sendChatBtn').onclick = async () => {
        if (!_currentUser) {
            alert('Please sign in first!');
            return;
        }

        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        const { error } = await _supabase
            .from('messages')
            .insert({
                user_id: _currentUser.id,
                user_name: _currentUser.email.split('@')[0],
                text: text
            });
        
        if (error) {
            alert('Message error: ' + error.message);
        } else {
            input.value = '';
        }
    };
</script>
</body>
</html>
